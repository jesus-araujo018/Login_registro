<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesion de registro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    

</head>

<body>
    <div class="container">

        <div class="card_img">
            
        </div>
        <div class="card">
            <form>

                <h1>Destinos de ensueño</h1>

                <p>Mas que un viaje, una experiencia</p>
                
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@gmail.com" name="email" required>
                
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Registrarse</button>
            </form>
            <p class="copyright">2026 paraiso tricolor</p>
        </div>
    </div>
</body>
</html>
